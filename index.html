<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- Fixed zooming on mobile inputs and adjusted viewport scales -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>らくらく同棲</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="logo">らくらく同棲</h1>
            <div class="header-actions">
                <div class="select-wrapper">
                    <select id="user-selector" class="styled-select">
                    </select>
                </div>
                <button id="btn-settings" class="icon-button">
                    <span class="material-icons-round">settings</span>
                </button>
            </div>
        </header>

        <main class="app-content">
            
            <section id="tab-payment" class="tab-panel active">
                <div class="section-title-bar">
                    <h2>支出の記録</h2>
                </div>
                <div class="timeline" id="payment-timeline">
                </div>
                <button class="fab" id="fab-add-payment">
                    <span class="material-icons-round">add</span>
                </button>
            </section>

            <section id="tab-shopping" class="tab-panel">
                <div class="section-title-bar">
                    <h2>買い物リスト</h2>
                </div>
                <div class="shopping-input-card">
                    <input type="text" id="shopping-item-name" placeholder="買うものを入力...">
                    <button id="btn-add-shopping" class="primary-button-sm">追加</button>
                </div>
                <ul class="shopping-list" id="shopping-list-items">
                </ul>
            </section>

            <section id="tab-settlement" class="tab-panel">
                <div class="section-title-bar">
                    <h2>今月の精算</h2>
                </div>
                <!-- Excluded this card from font-size scaling adjustments per instructions -->
                <div class="settlement-card" id="settlement-card">
                    <p class="settlement-period" id="settlement-month-label">2026-06 の清算</p>
                    <div class="settlement-result" id="settlement-result-text">
                    </div>
                    <div class="confirmation-status">
                        <button class="conf-btn" id="btn-confirm-user1">
                            <span class="material-icons-round check-icon">check_circle</span>
                            <span class="label" id="label-confirm-user1">ユーザー1の確認</span>
                        </button>
                        <button class="conf-btn" id="btn-confirm-user2">
                            <span class="material-icons-round check-icon">check_circle</span>
                            <span class="label" id="label-confirm-user2">ユーザー2の確認</span>
                        </button>
                    </div>
                </div>
                <div class="center-container">
                    <button id="btn-reset-data" class="text-danger-button">アプリデータをリセットする</button>
                </div>
            </section>

            <section id="tab-archive" class="tab-panel">
                <div class="section-title-bar">
                    <h2>過去の履歴</h2>
                    <select id="archive-month-filter" class="styled-select-sm">
                    </select>
                </div>
                <div class="timeline" id="archive-timeline">
                </div>
            </section>

        </main>

        <nav class="app-nav">
            <button class="nav-item active" data-tab="tab-payment">
                <span class="material-icons-round">account_balance_wallet</span>
                <span>支払い</span>
            </button>
            <button class="nav-item" data-tab="tab-shopping">
                <span class="material-icons-round">shopping_cart</span>
                <span>買い物</span>
            </button>
            <button class="nav-item" data-tab="tab-settlement">
                <span class="material-icons-round">receipt_long</span>
                <span>精算</span>
            </button>
            <button class="nav-item" data-tab="tab-archive">
                <span class="material-icons-round">archive</span>
                <span>履歴</span>
            </button>
        </nav>

        <!-- Configuration Profile Modal -->
        <div class="modal-overlay" id="modal-profile">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>プロフィールの編集</h3>
                    <button class="close-button" id="btn-close-profile">閉じる</button>
                </div>
                
                <div class="modal-tabs">
                    <button class="modal-tab-btn active" id="modal-tab-u1" onclick="switchProfileEditor(1)">フェイヤ</button>
                    <button class="modal-tab-btn" id="modal-tab-u2" onclick="switchProfileEditor(2)">ブイ</button>
                    <button class="modal-tab-btn" id="modal-tab-color" onclick="switchProfileEditor(3)">精算完了カラー</button>
                </div>

                <div class="modal-body">
                    <div id="form-user-edit">
                        <div class="avatar-placeholder">
                            <span class="material-icons-round">image</span>
                        </div>
                        <div class="form-group">
                            <label>表示名</label>
                            <input type="text" id="edit-name">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>年齢</label>
                                <input type="number" id="edit-age">
                            </div>
                            <div class="form-group">
                                <label>性別</label>
                                <input type="text" id="edit-gender">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>テーマカラー</label>
                            <div class="color-picker" id="user-color-picker"></div>
                        </div>
                    </div>

                    <div id="form-settled-color-edit" style="display:none;">
                        <p class="info-text">2人とも精算確認を完了した際の、カードの背景色を選択してください。</p>
                        <div class="form-group">
                            <div class="color-picker" id="settled-color-picker"></div>
                        </div>
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="primary-button" id="btn-save-profile">保存して閉じる</button>
                </div>
            </div>
        </div>

        <!-- Payment Entry & Edit Modal -->
        <div class="modal-overlay" id="modal-payment-entry">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="payment-modal-title">支払いを記録</h3>
                    <button class="close-button" id="btn-close-payment">閉じる</button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="pay-edit-id" value="">
                    <div class="form-group">
                        <label>項目・内訳（例：家賃、電気代）</label>
                        <input type="text" id="pay-title" placeholder="何のお金？">
                    </div>
                    <div class="form-group">
                        <label>金額 (円)</label>
                        <input type="number" id="pay-amount" placeholder="0">
                    </div>
                    <div class="form-group full-width-slider-group">
                        <label>相手の負担割合 (<span id="ratio-display">50</span>%)</label>
                        <input type="range" id="pay-ratio" min="0" max="100" step="5" value="50" class="full-width-range">
                    </div>
                    <div class="form-group">
                        <label>相手の負担額</label>
                        <input type="text" id="pay-calc-amount" readonly value="0 円" class="readonly-input">
                    </div>
                    <div class="form-group">
                        <label>メモ（対象月など）</label>
                        <input type="text" id="pay-memo" placeholder="2026年7月分、など">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="primary-button" id="btn-save-payment" disabled>記録する</button>
                </div>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
