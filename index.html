<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>らくらく同棲</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Round">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="logo">らくらく同棲</h1>
            <div class="header-actions">
                <div class="select-wrapper">
                    <select id="user-selector" class="styled-select"></select>
                </div>
                <button id="btn-settings" class="icon-button">
                    <span class="material-icons-round">settings</span>
                </button>
            </div>
        </header>

        <main class="app-content">

            <!-- 支払いタブ -->
            <section id="tab-payment" class="tab-panel active">
                <div class="section-title-bar">
                    <h2>支出の記録</h2>
                </div>
                <div class="timeline" id="payment-timeline"></div>
                <button class="fab" id="fab-add-payment">
                    <span class="material-icons-round">add</span>
                </button>
            </section>

            <!-- 買い物タブ -->
            <section id="tab-shopping" class="tab-panel">
                <div class="section-title-bar">
                    <h2>買い物リスト</h2>
                </div>
                <div class="shopping-input-card">
                    <input type="text" id="shopping-item-name" placeholder="買うものを入力...">
                    <div class="select-wrapper-inline">
                        <select id="shopping-category" class="styled-select-inline">
                            <option value="百均">百均</option>
                            <option value="食材">食材</option>
                            <option value="薬局">薬局</option>
                            <option value="文具">文具</option>
                            <option value="他">他</option>
                        </select>
                    </div>
                    <button id="btn-add-shopping" class="primary-button-sm">追加</button>
                </div>
                <ul class="shopping-list" id="shopping-list-items"></ul>
            </section>

            <!-- 精算タブ -->
            <section id="tab-settlement" class="tab-panel">
                <div class="section-title-bar">
                    <h2>今月の精算</h2>
                </div>
                <div class="settlement-card" id="settlement-card">
                    <p class="settlement-period" id="settlement-month-label">2026-06 の清算</p>
                    <div class="settlement-result" id="settlement-result-text"></div>
                    <div class="confirmation-status">
                        <button class="conf-btn" id="btn-confirm-user1">
                            <span class="material-icons-round check-icon">check_circle</span>
                            <span class="label" id="label-confirm-user1">ユーザー1の確認</span>
                        </button>
                        <button class="conf-btn" id="btn-confirm-user2">
                            <span class="material-icons-round check-icon">check_circle</span>
                            <span class="label" id="label-confirm-user2">ユーザー2の確認</span>
                        </button>
                    </div>
                </div>
                <div class="csv-io-section">
                    <button id="btn-csv-export" class="csv-button">
                        <span class="material-icons-round">download</span>
                        CSVエクスポート
                    </button>
                    <label class="csv-button csv-import-label" for="csv-import-input">
                        <span class="material-icons-round">upload</span>
                        CSVインポート
                    </label>
                    <input type="file" id="csv-import-input" accept=".csv" style="display:none;">
                </div>
            </section>

            <!-- 冷蔵庫タブ -->
            <section id="tab-fridge" class="tab-panel">
                <div class="section-title-bar">
                    <h2>冷蔵庫</h2>
                </div>
                <div class="accordion-list" id="fridge-accordion">
                    <!-- アコーディオン: 冷蔵室 -->
                    <div class="accordion-section" data-category="冷蔵室">
                        <button class="accordion-header">
                            <span class="material-icons-round accordion-icon">kitchen</span>
                            <span class="accordion-title">冷蔵室</span>
                            <span class="accordion-count" id="count-冷蔵室">0</span>
                            <span class="material-icons-round accordion-chevron">expand_more</span>
                        </button>
                        <div class="accordion-body open">
                            <ul class="fridge-item-list" id="list-冷蔵室"></ul>
                        </div>
                    </div>
                    <!-- アコーディオン: 冷凍室 -->
                    <div class="accordion-section" data-category="冷凍室">
                        <button class="accordion-header">
                            <span class="material-icons-round accordion-icon">ac_unit</span>
                            <span class="accordion-title">冷凍室</span>
                            <span class="accordion-count" id="count-冷凍室">0</span>
                            <span class="material-icons-round accordion-chevron">expand_more</span>
                        </button>
                        <div class="accordion-body">
                            <ul class="fridge-item-list" id="list-冷凍室"></ul>
                        </div>
                    </div>
                    <!-- アコーディオン: 常温室 -->
                    <div class="accordion-section" data-category="常温室">
                        <button class="accordion-header">
                            <span class="material-icons-round accordion-icon">eco</span>
                            <span class="accordion-title">常温室</span>
                            <span class="accordion-count" id="count-常温室">0</span>
                            <span class="material-icons-round accordion-chevron">expand_more</span>
                        </button>
                        <div class="accordion-body">
                            <ul class="fridge-item-list" id="list-常温室"></ul>
                        </div>
                    </div>
                </div>
                <button class="fab" id="fab-add-fridge">
                    <span class="material-icons-round">add</span>
                </button>
            </section>

            <!-- 履歴タブ -->
            <section id="tab-archive" class="tab-panel">
                <div class="section-title-bar">
                    <h2>過去の履歴</h2>
                    <select id="archive-month-filter" class="styled-select-sm"></select>
                </div>
                <div class="timeline" id="archive-timeline"></div>
            </section>

        </main>

        <nav class="app-nav">
            <button class="nav-item active" data-tab="tab-payment">
                <span class="material-icons-round">account_balance_wallet</span>
                <span>支払い</span>
            </button>
            <button class="nav-item" data-tab="tab-shopping">
                <span class="material-icons-round">shopping_cart</span>
                <span>買い物</span>
            </button>
            <button class="nav-item" data-tab="tab-settlement">
                <span class="material-icons-round">receipt_long</span>
                <span>精算</span>
            </button>
            <button class="nav-item" data-tab="tab-fridge">
                <span class="material-icons-round">kitchen</span>
                <span>冷蔵庫</span>
            </button>
            <button class="nav-item" data-tab="tab-archive">
                <span class="material-icons-round">archive</span>
                <span>履歴</span>
            </button>
        </nav>

        <!-- プロフィール設定モーダル -->
        <div class="modal-overlay" id="modal-profile">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-header-text">
                        <h3 id="modal-profile-title">プロフィールの編集</h3>
                        <p class="modal-subtitle" id="modal-profile-subtitle"></p>
                    </div>
                    <button class="close-button" id="btn-close-profile">閉じる</button>
                </div>
                <div class="onboarding-progress" id="onboarding-progress">
                    <div class="onboarding-progress-fill" id="onboarding-progress-fill"></div>
                </div>
                <div class="modal-tabs" id="modal-profile-tabs">
                    <button class="modal-tab-btn active" id="modal-tab-u1" onclick="switchProfileEditor(1)">フェイヤ</button>
                    <button class="modal-tab-btn" id="modal-tab-u2" onclick="switchProfileEditor(2)">ブイ</button>
                    <button class="modal-tab-btn" id="modal-tab-color" onclick="switchProfileEditor(3)">精算完了カラー</button>
                </div>
                <div class="modal-body">
                    <div id="form-user-edit">
                        <div class="avatar-preview-wrap">
                            <div class="user-avatar-preview" id="user-avatar-preview">?</div>
                        </div>
                        <div class="form-group">
                            <label>表示名</label>
                            <input type="text" id="edit-name" placeholder="名前を入力してください">
                        </div>
                        <div class="form-group">
                            <label>テーマカラー</label>
                            <div class="color-picker" id="user-color-picker"></div>
                        </div>
                    </div>
                    <div id="form-settled-color-edit" style="display:none;">
                        <p class="info-text">2人とも精算確認を完了した際の、カードの背景色を選択してください。</p>
                        <div class="form-group">
                            <div class="color-picker" id="settled-color-picker"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="primary-button" id="btn-save-profile">保存して閉じる</button>
                </div>
            </div>
        </div>

        <!-- 支払い記録・編集モーダル -->
        <div class="modal-overlay" id="modal-payment-entry">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="payment-modal-title">支払いを記録</h3>
                    <button class="close-button" id="btn-close-payment">閉じる</button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="pay-edit-id" value="">
                    <div class="form-group">
                        <label>項目・内訳（例：家賃、電気代）</label>
                        <input type="text" id="pay-title" placeholder="何のお金？">
                    </div>
                    <div class="form-group">
                        <label>金額 (円)</label>
                        <input type="number" id="pay-amount" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label>日付</label>
                        <input type="date" id="pay-date">
                    </div>
                    <div class="form-group full-width-slider-group">
                        <label>相手の負担割合 (<span id="ratio-display">50</span>%)</label>
                        <input type="range" id="pay-ratio" min="0" max="100" step="5" value="50" class="full-width-range">
                    </div>
                    <div class="form-group">
                        <label>相手の負担額</label>
                        <input type="text" id="pay-calc-amount" readonly value="0 円" class="readonly-input">
                    </div>
                    <div class="form-group">
                        <label>メモ（対象月など）</label>
                        <input type="text" id="pay-memo" placeholder="2026年7月分、など">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="primary-button" id="btn-save-payment" disabled>記録する</button>
                </div>
            </div>
        </div>

        <!-- 冷蔵庫アイテム追加モーダル -->
        <div class="modal-overlay" id="modal-fridge-entry">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="fridge-modal-title">食材を追加</h3>
                    <button class="close-button" id="btn-close-fridge">閉じる</button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="fridge-edit-id" value="">
                    <div class="form-group">
                        <label>商品名</label>
                        <input type="text" id="fridge-name" placeholder="例：卵、鶏肉">
                    </div>
                    <div class="form-group">
                        <label>数量と単位</label>
                        <div class="fridge-qty-row">
                            <input type="number" id="fridge-qty" placeholder="1" min="0" step="1">
                            <select id="fridge-unit" class="styled-select-inline">
                                <option value="グラム">グラム</option>
                                <option value="個" selected>個</option>
                                <option value="パック">パック</option>
                                <option value="箱">箱</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>場所</label>
                        <select id="fridge-category" class="styled-select-inline" style="width:100%;">
                            <option value="冷蔵室">冷蔵室</option>
                            <option value="冷凍室">冷凍室</option>
                            <option value="常温室">常温室</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>賞味期限・消費期限（任意）</label>
                        <input type="date" id="fridge-expiry" placeholder="">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="primary-button" id="btn-save-fridge" disabled>追加する</button>
                </div>
            </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
